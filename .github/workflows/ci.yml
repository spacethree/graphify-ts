name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - '20'
          - '22'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        if: matrix.os != 'ubuntu-latest' || matrix.node-version != '22'
        run: npm run test:run

      - name: Run tests with coverage thresholds
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Security audit
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        run: npm audit --audit-level=high

      - name: Generate demo graph for eval regression
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        run: node dist/src/cli/bin.js generate examples/demo-repo --no-html

      - name: Enforce eval regression thresholds
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        shell: bash
        run: |
          set -euo pipefail
          runner_template='node .github/scripts/ci-prompt-runner.mjs --prompt {prompt_file} --output {output_file} --question {question} --mode {mode}'
          output="$(node dist/src/cli/bin.js eval examples/demo-repo/graphify-out/graph.json --questions examples/demo-repo/benchmark-questions.json --exec "$runner_template" --yes)"
          printf '%s\n' "$output"

          recall="$(printf '%s\n' "$output" | awk '/Recall:/ { gsub("%", "", $2); print $2 }')"
          mrr="$(printf '%s\n' "$output" | awk '/MRR:/ { print $2 }')"
          snippet_coverage="$(printf '%s\n' "$output" | awk '/Snippet coverage:/ { gsub("%", "", $3); print $3 }')"

          node -e "const recall = Number(process.argv[1]); const mrr = Number(process.argv[2]); const snippetCoverage = Number(process.argv[3]); if (!Number.isFinite(recall) || recall < 95 || !Number.isFinite(mrr) || mrr < 0.95 || !Number.isFinite(snippetCoverage) || snippetCoverage < 95) { console.error('eval thresholds failed: recall=' + recall + ', mrr=' + mrr + ', snippet_coverage=' + snippetCoverage); process.exit(1) }" "$recall" "$mrr" "$snippet_coverage"

      - name: Validate npm package contents
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20'
        run: npm pack --dry-run
