name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Validate tag, package version, and changelog
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -pe 'require("./package.json").version')"

          if [[ -z "$VERSION" || "$VERSION" == "undefined" ]]; then
            echo "package.json must contain a valid version field"
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must look like v1.2.3 or v1.2.3-beta.1"
            exit 1
          fi

          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "Tag $TAG does not match package.json version v$VERSION"
            exit 1
          fi

          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "CHANGELOG.md is missing a section for version $VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Validate npm package contents
        run: npm pack --dry-run

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub release already exists for $GITHUB_REF_NAME"
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
