<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Graphify Demo Walkthrough - YouTube</title>
    <link rel="canonical" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" />
    <meta property="og:url" content="https://www.youtube.com/watch?v=dQw4w9WgXcQ" />
    <meta property="og:title" content="Graphify Demo Walkthrough" />
    <meta property="og:description" content="Deterministic roadmap demo with chapter markers." />
    <meta property="og:image" content="https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg" />
    <meta name="author" content="Graphify Channel" />
    <script>
      var ytInitialData = {
        "playerOverlays": {
          "playerOverlayRenderer": {
            "decoratedPlayerBarRenderer": {
              "decoratedPlayerBarRenderer": {
                "playerBar": {
                  "multiMarkersPlayerBarRenderer": {
                    "markersMap": [
                      {
                        "key": "DESCRIPTION_CHAPTERS",
                        "value": {
                          "chapters": [
                            {
                              "chapterRenderer": {
                                "title": { "simpleText": "Intro" },
                                "timeRangeStartMillis": 0
                              }
                            },
                            {
                              "chapterRenderer": {
                                "title": { "simpleText": "Route-aware ingest" },
                                "timeRangeStartMillis": 155000
                              }
                            },
                            {
                              "chapterRenderer": {
                                "title": { "simpleText": "Next roadmap slice" },
                                "timeRangeStartMillis": 320000
                              }
                            }
                          ]
                        }
                      }
                    ]
                  }
                }
              }
            }
          }
        }
      };
    </script>
  </head>
  <body>
    <main>
      <h1>Graphify Demo Walkthrough</h1>
      <p>Deterministic roadmap demo with chapter markers.</p>
    </main>
